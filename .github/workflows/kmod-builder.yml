name: Kmod Builder

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Kernel modules to build (e.g. kmod-wireguard, space-separated)'
        required: true
        type: string
        default: 'kmod-wireguard'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Cache ccache and dl
      uses: actions/cache@main
      with:
        path: |
          ~/.cache/ccache
          openwrt/dl
        key: openwrt-cache-v2

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential ccache c++-multilib flex bison gawk git libncurses-dev libssl-dev python3 python3-setuptools swig unzip wget rsync
        sudo timedatectl set-timezone "Asia/Shanghai"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone LEDE source (pinned)
      working-directory: /workdir
      run: |
        # Pin to the commit that the last successful Release used
        git clone https://github.com/coolsnowwolf/lede -b master openwrt
        cd openwrt
        git log --oneline -1

    - name: Setup feeds
      working-directory: /workdir/openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure
      working-directory: /workdir/openwrt
      run: |
        # Start with target config
        cat > .config << 'CONFIGEOF'
CONFIG_TARGET_x86=y
CONFIG_TARGET_x86_64=y
CONFIG_TARGET_x86_64_DEVICE_generic=y
CONFIG_DEVEL=y
CONFIG_CCACHE=y
CONFIG_AUTOREMOVE=y
CONFIGEOF
        for pkg in ${{ inputs.packages }}; do
          echo "CONFIG_PACKAGE_${pkg}=y" >> .config
        done
        make defconfig

    - name: Download packages
      working-directory: /workdir/openwrt
      run: |
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Build packages
      working-directory: /workdir/openwrt
      run: |
        for pkg in ${{ inputs.packages }}; do
          echo "=== Building $pkg ==="
          make package/$pkg/compile -j$(nproc) V=s || make package/$pkg/compile -j1 V=s
        done

    - name: Collect IPKs
      run: |
        mkdir -p /workdir/output
        find /workdir/openwrt/bin/packages -name "*.ipk" -exec cp {} /workdir/output/ \;
        ls -la /workdir/output/
        echo "PKG_COUNT=$(ls /workdir/output/*.ipk 2>/dev/null | wc -l)" >> $GITHUB_ENV

    - name: Upload packages
      uses: actions/upload-artifact@main
      with:
        name: packages-${{ inputs.packages }}
        path: /workdir/output/*.ipk

    - name: Summary
      run: |
        echo "### Built ${{ env.PKG_COUNT }} package(s)" >> $GITHUB_STEP_SUMMARY
        echo "${{ inputs.packages }}" >> $GITHUB_STEP_SUMMARY
