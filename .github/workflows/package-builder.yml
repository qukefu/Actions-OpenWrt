name: Package Builder

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to build (space-separated)'
        required: true
        type: string
        default: 'luci-app-passwall'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cache tools and toolchain (always save)
      uses: actions/cache@v4
      with:
        path: |
          /workdir/openwrt/staging_dir
          /workdir/openwrt/build_dir/host
        key: openwrt-tools-v1

    - name: Cache ccache and dl
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/ccache
          /workdir/openwrt/dl
        key: openwrt-dl-ccache-v1

    - name: Install build dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential ccache gcc-multilib g++-multilib flex bison gawk git libncurses-dev libssl-dev python3 python3-setuptools swig unzip wget rsync
        sudo timedatectl set-timezone "Asia/Shanghai"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone LEDE source
      working-directory: /workdir
      run: |
        git clone https://github.com/coolsnowwolf/lede -b master openwrt
        rm -rf $GITHUB_WORKSPACE/openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Copy custom packages
      run: |
        if [ -d $GITHUB_WORKSPACE/package ]; then
          cp -r $GITHUB_WORKSPACE/package/luci-app-easyclash /workdir/openwrt/package/
          echo "Custom package copied"
        fi

    - name: Setup feeds
      working-directory: /workdir/openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure
      working-directory: /workdir/openwrt
      run: |
        echo CONFIG_TARGET_x86=y > .config
        echo CONFIG_TARGET_x86_64=y >> .config
        echo CONFIG_TARGET_x86_64_DEVICE_generic=y >> .config
        echo CONFIG_DEVEL=y >> .config
        echo CONFIG_CCACHE=y >> .config
        echo CONFIG_AUTOREMOVE=y >> .config
        echo "CONFIG_ALL_KMODS=n" >> .config
        for pkg in ${{ inputs.packages }}; do
          echo "CONFIG_PACKAGE_${pkg}=y" >> .config
        done
        make defconfig
        echo "=== Kernel modules enabled ==="
        grep "CONFIG_PACKAGE_kmod.*=y" .config || echo "(none)"
        echo "=== Our package ==="
        grep "easyclash" .config

    - name: Build tools and toolchain
      working-directory: /workdir/openwrt
      run: |
        make tools/install -j$(nproc) || make tools/install -j1
        make toolchain/install -j$(nproc) || make toolchain/install -j1

    - name: Build packages
      working-directory: /workdir/openwrt
      run: |
        for pkg in ${{ inputs.packages }}; do
          echo "=== Building $pkg ==="
          make package/$pkg/compile V=s -j$(nproc) || make package/$pkg/compile V=s -j1
        done

    - name: Collect IPKs
      run: |
        mkdir -p /workdir/output
        find /workdir/openwrt/bin/packages -name "*.ipk" -exec cp {} /workdir/output/ \;
        echo "=== Built packages ==="
        ls -la /workdir/output/
        echo "PKG_COUNT=$(ls /workdir/output/*.ipk 2>/dev/null | wc -l)" >> $GITHUB_ENV

    - name: Upload packages
      uses: actions/upload-artifact@v4
      with:
        name: packages-${{ inputs.packages }}
        path: /workdir/output/*.ipk

    - name: Summary
      run: 'echo "### Built ${{ env.PKG_COUNT }} package(s): ${{ inputs.packages }}" >> $GITHUB_STEP_SUMMARY'
