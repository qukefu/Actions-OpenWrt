name: Package Builder

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to build (e.g. luci-app-passwall, space-separated)'
        required: true
        type: string
        default: 'luci-app-passwall'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download latest SDK
      run: |
        RELEASE=$(curl -s https://api.github.com/repos/qukefu/Actions-OpenWrt/releases/latest \
          | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
        SDK_URL="https://github.com/qukefu/Actions-OpenWrt/releases/download/${RELEASE}/openwrt-sdk-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.xz"
        echo "SDK_URL=$SDK_URL"
        mkdir -p $GITHUB_WORKSPACE/workdir && cd $GITHUB_WORKSPACE/workdir
        wget -q "$SDK_URL" -O sdk.tar.xz || {
          echo "SDK not found in release, check if CONFIG_SDK=y is set"
          exit 1
        }
        tar -xf sdk.tar.xz
        mv openwrt-sdk-* sdk
        echo "WORKDIR=$(pwd)/sdk" >> $GITHUB_ENV

    - name: Copy custom packages
      run: |
        if [ -d package ]; then
          cp -r package/* ${{ env.WORKDIR }}/package/
          echo "Copied custom packages:"
          ls -d ${{ env.WORKDIR }}/package/luci-app-* 2>/dev/null || echo "(checking...)"

    - name: Setup feeds and defconfig
      working-directory: ${{ env.WORKDIR }}
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        make defconfig

    - name: Enable and build packages
      working-directory: ${{ env.WORKDIR }}
      run: |
        for pkg in ${{ inputs.packages }}; do
          echo "=== Building $pkg ==="
          # Check if Makefile exists
          if [ -f "package/$pkg/Makefile" ]; then
            echo "CONFIG_PACKAGE_${pkg}=y" >> .config
            make defconfig 2>&1 || true
            make package/$pkg/compile V=s -j$(nproc) || make package/$pkg/compile V=s -j1 || echo "FAILED: $pkg"
          else
            echo "ERROR: package/$pkg/Makefile not found!"
            ls package/ 2>/dev/null
            ls package/luci-app-* 2>/dev/null || true
          fi
        done

    - name: Collect artifacts
      run: |
        mkdir -p $GITHUB_WORKSPACE/workdir/output
        find ${{ env.WORKDIR }}/bin/packages -name "*.ipk" -exec cp {} $GITHUB_WORKSPACE/workdir/output/ \; 2>/dev/null || true
        echo "PKG_COUNT=$(find $GITHUB_WORKSPACE/workdir/output -name '*.ipk' 2>/dev/null | wc -l)" >> $GITHUB_ENV

    - name: Upload packages
      uses: actions/upload-artifact@v4
      with:
        name: packages-${{ inputs.packages }}
        path: ${{ github.workspace }}/workdir/output/*.ipk

    - name: Summary
      run: 'echo "### Built ${{ env.PKG_COUNT }} package(s): ${{ inputs.packages }}" >> $GITHUB_STEP_SUMMARY'
